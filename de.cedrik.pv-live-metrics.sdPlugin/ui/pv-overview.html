<!doctype html>
<html>
	<head lang="en">
		<title>OV Overview Settings</title>
		<meta charset="utf-8" />
		<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
	</head>

	<body>
		<sdpi-item label="House IP">
			<sdpi-textfield setting="houseIp" placeholder="Enter House IP"></sdpi-textfield>
		</sdpi-item>

		<sdpi-item label="PV IPs">
			<sdpi-textarea setting="pvIps" placeholder="Enter PV IPs"></sdpi-textarea>
		</sdpi-item>

		<sdpi-item label="Refresh Rate">
			<sdpi-textfield setting="refresh" placeholder="Enter refresh rate"></sdpi-textfield>
		</sdpi-item>
	</body>
</html>
