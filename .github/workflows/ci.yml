name: CI Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (Rollup)
        run: npm run build

      - name: Validate Stream Deck plugin
        run: npm run validate

      - name: Pack Stream Deck plugin
        run: npm run pack

      - name: List dist output (debug)
        run: ls -R dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: streamdeck-plugin
          path: dist/*.streamDeckPlugin
          if-no-files-found: error
